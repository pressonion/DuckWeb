<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ducky's website</title>
    <style>
        /* CSS Variables for Dark Mode Toggling */
        :root {
            --bg-gradient: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            --menu-bg: #2c3e50;
            --text-main: #2c3e50;
            --text-light: #555;
            --box-bg: rgba(255, 255, 255, 0.85);
            --btn-hover: #f1c40f;
            --btn-text: #2c3e50;
            --icon-color: #ffffff; /* Default icon color */
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --menu-bg: #111;
            --text-main: #eee;
            --text-light: #ccc;
            --box-bg: rgba(0, 0, 0, 0.75);
            --btn-hover: #e67e22;
            --btn-text: #fff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden; 
            transition: background 0.5s ease;
        }

        /* Icon Container */
        #icon-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 70px;
            z-index: 101; 
            background: var(--menu-bg);
            border-bottom-right-radius: 15px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            transition: background 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .side-icon {
            width: 100%;
            padding: 15px 0;
            cursor: pointer;
            color: var(--icon-color);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
        }

        .side-icon svg { width: 28px; height: 28px; }
        .side-icon:hover { transform: scale(1.2); }
        #menu-icon { border-top: none; }

        /* Sidebar */
        #sidebar {
            position: absolute;
            top: 0;
            left: -320px; 
            width: 320px;
            height: 100vh;
            background-color: var(--menu-bg);
            color: white;
            transition: left 0.3s ease, background 0.3s;
            padding-top: 240px; 
            box-sizing: border-box;
            z-index: 100;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        #icon-container:hover ~ #sidebar, #sidebar:hover, #info-panel:hover {
            left: 0;
        }

        /* Game Buttons with Custom SVG Icons */
        .game-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background: none;
            color: white;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-btn:hover {
            background-color: var(--btn-hover); 
            color: var(--btn-text);
            padding-left: 30px; 
        }

        /* Hover Info Panel */
        #info-panel {
            position: fixed;
            top: 50%;
            left: -400px;
            transform: translateY(-50%);
            width: 300px;
            background: var(--box-bg);
            color: var(--text-main);
            padding: 20px;
            border-radius: 0 15px 15px 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: left 0.3s ease;
            z-index: 99;
            pointer-events: none; 
        }

        #info-panel h3 { margin-top: 0; color: var(--btn-hover); text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        #info-panel p { margin-bottom: 10px; font-size: 15px; }
        .controls-text { font-family: monospace; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 5px; }

        /* Main Content & Welcome */
        #main-content {
            margin-left: 70px; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #welcome-screen {
            text-align: center;
            background: var(--box-bg);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: background 0.5s;
        }

        #welcome-screen h1 { font-size: 50px; margin: 0 0 10px 0; }
        #welcome-screen p { font-size: 22px; color: var(--text-light); margin-bottom: 30px; }

        /* Bouncing Custom Ducks */
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .duck-decoration { width: 60px; height: 60px; display: inline-block; margin: 0 15px; animation: bob 2s infinite ease-in-out; }
        .duck-decoration:nth-child(2) { animation-delay: 0.3s; }
        .duck-decoration:nth-child(3) { animation-delay: 0.6s; }
        .duck-decoration:nth-child(4) { animation-delay: 0.9s; }

        /* Loading Screen */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            z-index: 50;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loader-duck { width: 80px; height: 80px; animation: spin 1s linear infinite; }
        #loader-text { font-size: 24px; font-weight: bold; margin-top: 20px; }

        /* Iframe */
        #game-frame { display: none; width: 100%; height: 100vh; border: none; z-index: 10;}
    </style>
</head>
<body>

    <svg style="display: none;">
        <symbol id="custom-duck" viewBox="0 0 16 16">
            <rect x="5" y="2" width="6" height="5" fill="#fff"/>
            <rect x="5" y="2" width="6" height="2" fill="#c0392b"/> <rect x="8" y="4" width="1" height="1" fill="#000"/> <rect x="11" y="4" width="4" height="2" fill="#f1c40f"/> <rect x="4" y="7" width="7" height="6" fill="#fff"/> <rect x="5" y="9" width="4" height="2" fill="#e0e0e0"/> <rect x="5" y="13" width="1" height="2" fill="#f1c40f"/> <rect x="8" y="13" width="1" height="2" fill="#f1c40f"/> 
        </symbol>
        <symbol id="main-duck" viewBox="0 0 16 16">
            <rect x="5" y="2" width="6" height="5" fill="#f1c40f"/>
            <rect x="8" y="4" width="1" height="1" fill="#000"/> <rect x="11" y="4" width="4" height="2" fill="#e67e22"/> <rect x="4" y="7" width="7" height="6" fill="#f1c40f"/> <rect x="5" y="9" width="4" height="2" fill="#f39c12"/> <rect x="5" y="13" width="1" height="2" fill="#e67e22"/> <rect x="8" y="13" width="1" height="2" fill="#e67e22"/> 
        </symbol>
    </svg>

    <div id="icon-container">
        <div id="menu-icon" class="side-icon" title="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
        <div class="side-icon" onclick="goHome()" title="Back to Main Menu">
            <svg><use href="#custom-duck"></use></svg>
        </div>
        <div class="side-icon" onclick="toggleDarkMode()" title="Settings / Dark Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </div>
        <div class="side-icon" onclick="toggleFullScreen()" title="Fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </div>
    </div>

    <div id="sidebar">
        
        <button class="game-btn" onclick="playGame('https://pressonion.github.io/duck-rogue/')" onmouseover="showInfo('Duck Rogue', 'Battle your way through endless rooms as a brave duck!', 'Arrow Keys to move, Space to attack')" onmouseout="hideInfo()">
            <div class="btn-icon"><svg width="100%" height="100%"><use href="#custom-duck"></use></svg></div> Duck Rogue
        </button>
        
        <button class="game-btn" onclick="playGame('https://pressonion.github.io/Doodle-Action/')" onmouseover="showInfo('Doodle Action', 'A fast-paced drawn action game.', 'WASD to move, Mouse to aim and shoot')" onmouseout="hideInfo()">
            <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="3"><circle cx="12" cy="12" r="8"></circle></svg></div> Doodle Action
        </button>

        <button class="game-btn" onclick="playGame('https://pressonion.github.io/Shooting-FUn/')" onmouseover="showInfo('Shooting Fun', 'Test your aim and reflexes in this shooter.', 'Mouse to aim, Left Click to shoot')" onmouseout="hideInfo()">
            <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2" fill="#3498db"></circle></svg></div> Shooting Fun
        </button>

        <button class="game-btn" onclick="playGame('https://pressonion.github.io/Getting-over/')" onmouseover="showInfo('Getting Over', 'A frustratingly fun physics climbing game.', 'Mouse movement controls the hammer')" onmouseout="hideInfo()">
            <div class="btn-icon"><svg viewBox="0 0 24 24" fill="#9b59b6"><path d="M20.46 3.54l-3.54-3.54-4.24 4.24 3.54 3.54zM11.97 9.2L3.48 17.68l2.83 2.83 8.49-8.49z"></path></svg></div> Getting Over
        </button>

        <button class="game-btn" onclick="playGame('https://pressonion.github.io/DUCK-RNG/')" onmouseover="showInfo('Duck RNG', 'Test your luck! Roll for the rarest ducks.', 'Click the button to roll')" onmouseout="hideInfo()">
            <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8" cy="8" r="1.5" fill="#2ecc71"></circle><circle cx="16" cy="16" r="1.5" fill="#2ecc71"></circle><circle cx="12" cy="12" r="1.5" fill="#2ecc71"></circle></svg></div> Duck RNG
        </button>

        <button class="game-btn" onclick="playGame('https://pressonion.github.io/Poker/')" onmouseover="showInfo('Poker', 'Test your card skills in this classic game.', 'Mouse to play your hand')" onmouseout="hideInfo()">
            <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#f1c40f" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"></rect><path d="M12 7c-2 0-3 2-3 4s3 5 3 5 3-3 3-5-1-4-3-4z" fill="#f1c40f"></path></svg></div> Poker
        </button>
    </div>

    <div id="info-panel">
        <h3 id="info-title">Game Title</h3>
        <p id="info-desc">Description goes here.</p>
        <strong>Controls:</strong>
        <p class="controls-text" id="info-controls">Controls go here.</p>
    </div>

    <div id="main-content">
        <div id="welcome-screen">
            <h1>Welcome to Ducky's website</h1>
            <p>Hover your mouse over the <b>☰ menu</b> on the left to browse and play my games</p>
            <div>
                <div class="duck-decoration"><svg width="100%" height="100%"><use href="#main-duck"></use></svg></div>
                <div class="duck-decoration"><svg width="100%" height="100%"><use href="#main-duck"></use></svg></div>
                <div class="duck-decoration"><svg width="100%" height="100%"><use href="#main-duck"></use></svg></div>
                <div class="duck-decoration"><svg width="100%" height="100%"><use href="#main-duck"></use></svg></div>
            </div>
        </div>

        <div id="loader">
            <div id="loader-duck"><svg width="100%" height="100%"><use href="#custom-duck"></use></svg></div>
            <div id="loader-text">Loading Game...</div>
        </div>
        
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // We create a variable to track the loading timer
        let loadTimer; 

        function playGame(gameUrl) {
            // Cancel any ghost timers from previous clicks!
            clearTimeout(loadTimer); 

            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('game-frame').style.display = 'none';
            
            // Force the sticky menu to hide instantly so it gets out of your way
            const sidebar = document.getElementById('sidebar');
            sidebar.style.display = 'none';
            
            // Bring the menu back into existence (hidden on the left) a split second later so it works next time
            setTimeout(() => { sidebar.style.display = ''; }, 100);

            // Show Loading Screen
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            // Wait 2 seconds, then show the game
            loadTimer = setTimeout(() => {
                loader.style.display = 'none';
                const frame = document.getElementById('game-frame');
                frame.style.display = 'block';
                frame.src = gameUrl;
            }, 2000); 
        }

        function goHome() {
            // Cancel the timer if you hit exit while a game is still loading!
            clearTimeout(loadTimer);

            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('game-frame').src = ''; 
            document.getElementById('loader').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'block';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function showInfo(title, desc, controls) {
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-desc').innerText = desc;
            document.getElementById('info-controls').innerText = controls;
            document.getElementById('info-panel').style.left = '320px'; 
        }

        function hideInfo() {
            document.getElementById('info-panel').style.left = '-400px'; 
        }
    </script>
</body>
</html>
